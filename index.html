<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Smash Tracker Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ff6b35;
            --primary-dark: #ff5722;
            --secondary: #4ecdc4;
            --accent: #ffe66d;
            --dark-bg: #0f1419;
            --card-bg: #1a1f2e;
            --text-primary: #ffffff;
            --text-secondary: #b0b8c1;
            --border: #2d3748;
            --success: #2ecc71;
            --danger: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--dark-bg) 0%, #1a2332 100%);
            color: var(--text-primary);
            min-height: 100vh;
        }

        header {
            background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 24px 20px;
            box-shadow: 0 8px 32px rgba(255, 107, 53, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header h1 {
            font-size: 28px;
            font-weight: 800;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card h2 {
            font-size: 20px;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .card h3 {
            font-size: 16px;
            margin: 16px 0 12px;
            font-weight: 700;
            color: var(--accent);
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        select, input, textarea {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 107, 53, 0.05);
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .button-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
        }

        button {
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-family: inherit;
        }

        button:active {
            transform: scale(0.98);
        }

        .btn-win {
            background: linear-gradient(135deg, var(--success) 0%, #27ae60 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }

        .btn-win:hover {
            box-shadow: 0 6px 20px rgba(46, 204, 113, 0.4);
        }

        .btn-lose {
            background: linear-gradient(135deg, var(--danger) 0%, #c0392b 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3);
        }

        .btn-lose:hover {
            box-shadow: 0 6px 20px rgba(231, 76, 60, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 107, 53, 0.2);
            color: var(--primary);
            padding: 8px 12px;
            font-size: 12px;
        }

        .btn-secondary:hover {
            background: rgba(255, 107, 53, 0.3);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
            padding: 6px 10px;
            font-size: 11px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border);
            overflow-x: auto;
            padding-bottom: 12px;
        }

        .tab {
            padding: 10px 16px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            white-space: nowrap;
            transition: all 0.3s ease;
            border-bottom: 2px solid transparent;
        }

        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(255, 107, 53, 0.1) 0%, rgba(78, 205, 196, 0.1) 100%);
            border: 1px solid rgba(255, 107, 53, 0.2);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }

        .stat-label {
            font-size: 11px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent);
        }

        .stat-value.winrate {
            font-size: 32px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .monthly-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .monthly-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .monthly-item:hover {
            border-color: var(--primary);
            background: rgba(255, 107, 53, 0.05);
        }

        .monthly-period {
            font-weight: 600;
            color: var(--text-primary);
        }

        .monthly-stats {
            color: var(--accent);
            font-weight: 700;
        }

        .chart-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            position: relative;
            height: 300px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .char-input-group {
            display: flex;
            gap: 8px;
        }

        .char-input-group input {
            flex: 1;
        }

        .char-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .char-tag {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .char-tag button {
            background: transparent;
            border: none;
            color: white;
            font-size: 14px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            max-width: 400px;
            width: 90%;
            border: 1px solid var(--border);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .user-info {
            display: flex;
            gap: 10px;
            align-items: center;
            font-size: 14px;
        }

        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            header h1 {
                flex-direction: column;
                gap: 8px;
            }

            .button-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>
        <span>⚔ Smash Tracker Pro</span>
        <div class="user-info">
            <span id="userEmail"></span>
            <button class="btn-secondary" onclick="logout()">ログアウト</button>
        </div>
    </h1>
</header>

<div id="authSection">
    <div class="container">
        <div class="card" style="max-width: 400px; margin: 100px auto;">
            <h2>ログイン / 新規登録</h2>
            <div class="form-group">
                <label>メールアドレス</label>
                <input id="email" type="email" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>パスワード</label>
                <input id="password" type="password" placeholder="パスワード">
            </div>
            <div class="button-group">
                <button class="btn-win" onclick="signup()">新規登録</button>
                <button class="btn-win" onclick="login()">ログイン</button>
            </div>
        </div>
    </div>
</div>

<div id="appSection" style="display:none">
    <div class="container">
        <div class="grid-2">
            <!-- 左側：試合記録フォーム -->
            <div class="card">
                <h2>📝 試合記録</h2>

                <div class="form-group">
                    <label>自キャラ</label>
                    <select id="myChar">
                        <option value="">選択してください</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>相手キャラ</label>
                    <select id="enemyChar">
                        <option value="">選択してください</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>コメント・対策メモ</label>
                    <textarea id="memo" placeholder="この試合のメモや対策を記入"></textarea>
                </div>

                <div class="button-group">
                    <button class="btn-win" onclick="saveMatch('win')">✓ 勝ち</button>
                    <button class="btn-lose" onclick="saveMatch('lose')">✗ 負け</button>
                </div>

                <h3 style="margin-top: 24px;">キャラクター管理</h3>
                <div class="char-input-group">
                    <input id="newCharInput" type="text" placeholder="新しいキャラを追加">
                    <button class="btn-secondary" onclick="addCharacter()">追加</button>
                </div>
                <div class="char-list" id="charList"></div>
            </div>

            <!-- 右側：統計情報 -->
            <div class="card">
                <h2>📊 総合統計</h2>
                <div class="stats-grid" id="overallStats"></div>
            </div>
        </div>

        <!-- タブセクション -->
        <div class="card">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('overview')">📈 概要</button>
                <button class="tab" onclick="switchTab('winrate')">📊 勝率グラフ</button>
                <button class="tab" onclick="switchTab('matchups')">⚔️ 相手相性</button>
                <button class="tab" onclick="switchTab('analysis')">🔍 詳細分析</button>
                <button class="tab" onclick="switchTab('history')">📜 履歴</button>
            </div>

            <!-- 概要パネル -->
            <div id="overview" class="panel active">
                <h2>本日・直近の成績</h2>
                <div class="stats-grid" id="todayStats"></div>
                
                <h3 style="margin-top: 24px;">現在のストリーク</h3>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-label">連勝</div>
                        <div class="stat-value" id="winStreak">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">連敗</div>
                        <div class="stat-value" id="loseStreak">0</div>
                    </div>
                </div>
            </div>

            <!-- 勝率グラフパネル -->
            <div id="winrate" class="panel">
                <h2>勝率推移</h2>
                <div class="chart-container">
                    <canvas id="winrateChart"></canvas>
                </div>

                <h3>相手キャラ別勝率</h3>
                <div class="chart-container">
                    <canvas id="matchupChart"></canvas>
                </div>
            </div>

            <!-- 相手相性パネル -->
            <div id="matchups" class="panel">
                <h2>相手別分析</h2>
                <div class="form-group">
                    <label>相手キャラ</label>
                    <select id="analysisEnemySelect">
                        <option value="">すべての相手</option>
                    </select>
                </div>
                <div id="matchupsContent"></div>
            </div>

            <!-- 詳細分析パネル -->
            <div id="analysis" class="panel">
                <h2>自キャラ別分析</h2>
                <div class="form-group">
                    <label>自キャラ</label>
                    <select id="analysisMySelect">
                        <option value="">すべてのキャラ</option>
                    </select>
                </div>
                <div id="analysisContent"></div>
            </div>

            <!-- 履歴パネル -->
            <div id="history" class="panel">
                <h2>試合履歴</h2>
                <div class="form-group">
                    <label>検索</label>
                    <input id="searchFilter" type="text" placeholder="キャラ名やメモで検索">
                </div>
                <div id="historyList"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // ===== グローバル変数 =====
    const SUPABASE_URL = "https://eucirhzjjiddexqphtqf.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV1Y2lyaHpqamlkZGV4cXBodHFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5OTY4NDksImV4cCI6MjA5MjU3Mjg0OX0.N7pJgqLthF3IgpUsMvyjRiSaOuKQRQR1dVC9UntDfCI";
    
    let supabaseClient;
    let user = null;
    let allMatches = [];
    let characters = [
        'ゲッコウガ', 'シュルク', 'リンク', 'ピカチュウ', 'マリオ',
        'ドンキーコング', 'ルキナ', 'ヨッシー', 'カービィ', 'フォックス'
    ];
    let charts = {};

    try {
        supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    } catch (e) {
        console.error("Supabase初期化エラー:", e);
    }

    // ===== 認証 =====
    async function signup() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        if (!email || !password) {
            alert("メールアドレスとパスワードを入力してください。");
            return;
        }
        const { error } = await supabaseClient.auth.signUp({ email, password });
        if (error) { 
            alert("登録エラー: " + error.message); 
            return; 
        }
        alert("登録しました。メール確認後にログインしてください。");
    }

    async function login() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        if (!email || !password) {
            alert("メールアドレスとパスワードを入力してください。");
            return;
        }
        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) { 
            alert("ログインエラー: " + error.message); 
            return; 
        }
        window.location.reload();
    }

    async function logout() {
        await supabaseClient.auth.signOut();
        window.location.reload();
    }

    async function checkUser() {
        try {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                user = session.user;
                document.getElementById("authSection").style.display = "none";
                document.getElementById("appSection").style.display = "block";
                document.getElementById("userEmail").innerText = user.email;
                loadCharacters();
                loadData();
            }
        } catch (e) {
            console.error("ユーザー確認エラー:", e);
        }
    }

    // ===== キャラクター管理 =====
    async function loadCharacters() {
        try {
            const { data } = await supabaseClient
                .from("user_characters")
                .select("name")
                .eq("user_id", user.id);
            
            if (data && data.length > 0) {
                characters = data.map(c => c.name);
            }
            renderCharacters();
        } catch (e) {
            console.error("キャラ読み込みエラー:", e);
        }
    }

    async function addCharacter() {
        const input = document.getElementById("newCharInput");
        const name = input.value.trim();
        
        if (!name) {
            alert("キャラ名を入力してください。");
            return;
        }

        if (characters.includes(name)) {
            alert("既に登録されているキャラです。");
            return;
        }

        try {
            const { error } = await supabaseClient
                .from("user_characters")
                .insert({
                    user_id: user.id,
                    name: name
                });

            if (error) {
                alert("追加エラー: " + error.message);
                return;
            }

            characters.push(name);
            input.value = "";
            renderCharacters();
            updateSelectOptions();
        } catch (e) {
            console.error("キャラ追加エラー:", e);
        }
    }

    function renderCharacters() {
        const html = characters.map(char => `
            <div class="char-tag">
                ${char}
            </div>
        `).join('');
        document.getElementById("charList").innerHTML = html;
    }

    function updateSelectOptions() {
        const mySelect = document.getElementById("myChar");
        const enemySelect = document.getElementById("enemyChar");
        const analysisMySelect = document.getElementById("analysisMySelect");
        const analysisEnemySelect = document.getElementById("analysisEnemySelect");

        const options = characters.map(c => `<option value="${c}">${c}</option>`).join('');
        
        mySelect.innerHTML = '<option value="">選択してください</option>' + options;
        enemySelect.innerHTML = '<option value="">選択してください</option>' + options;
        analysisMySelect.innerHTML = '<option value="">すべてのキャラ</option>' + options;
        analysisEnemySelect.innerHTML = '<option value="">すべての相手</option>' + options;
    }

    // ===== データ操作 =====
    async function saveMatch(result) {
        const myChar = document.getElementById("myChar").value.trim();
        const enemyChar = document.getElementById("enemyChar").value.trim();
        const memo = document.getElementById("memo").value.trim();
        
        if (!myChar || !enemyChar) { 
            alert("自キャラと相手キャラを選択してください。"); 
            return; 
        }

        try {
            const { error } = await supabaseClient.from("matches").insert({
                user_id: user.id,
                my_char: myChar,
                enemy_char: enemyChar,
                result: result,
                memo: memo,
                created_at: new Date().toISOString()
            });

            if (error) { 
                alert("保存エラー: " + error.message); 
                return; 
            }

            document.getElementById("memo").value = "";
            document.getElementById("enemyChar").value = "";
            document.getElementById("myChar").value = "";
            loadData();
        } catch (e) {
            console.error("保存エラー:", e);
        }
    }

    async function loadData() {
        try {
            const { data, error } = await supabaseClient
                .from("matches")
                .select("*")
                .eq("user_id", user.id)
                .order("created_at", { ascending: false });
            
            if (error) { 
                console.error("データ読込エラー:", error);
                return; 
            }
            allMatches = data || [];
            render();
        } catch (e) {
            console.error("データ読込エラー:", e);
        }
    }

    async function deleteMatch(id) {
        if (!confirm("この試合記録を削除してよろしいですか？")) return;
        
        try {
            const { error } = await supabaseClient
                .from("matches")
                .delete()
                .eq("id", id);
            
            if (error) {
                alert("削除エラー: " + error.message);
            } else {
                loadData();
            }
        } catch (e) {
            console.error("削除エラー:", e);
        }
    }

    // ===== UI操作 =====
    function switchTab(tabId) {
        document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.getElementById(tabId).classList.add("active");
        event.target.classList.add("active");
        
        if (tabId === 'winrate') {
            setTimeout(() => {
                renderWinrateCharts();
            }, 100);
        }
        render();
    }

    // ===== 統計計算 =====
    function calcWL(arr) {
        let w = 0, l = 0;
        arr.forEach(m => m.result === 'win' ? w++ : l++);
        return { w, l };
    }

    function winrate(w, l) {
        return (w + l) ? ((w * 100) / (w + l)).toFixed(1) : '0.0';
    }

    function getToday() {
        const d = new Date();
        return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function calcCurrentStreak() {
        if (allMatches.length === 0) return { winStreak: 0, loseStreak: 0 };
        
        let winStreak = 0, loseStreak = 0;
        let lastResult = null;
        
        for (let i = 0; i < allMatches.length; i++) {
            if (lastResult === null) {
                lastResult = allMatches[i].result;
            }
            
            if (allMatches[i].result === lastResult) {
                if (lastResult === 'win') {
                    winStreak++;
                } else {
                    loseStreak++;
                }
            } else {
                break;
            }
        }
        
        return { winStreak, loseStreak };
    }

    // ===== レンダリング =====
    function render() {
        renderOverallStats();
        renderTodayStats();
        renderStreak();
        renderAnalysis();
        renderMatchups();
        renderHistory();
    }

    function renderOverallStats() {
        const allStats = calcWL(allMatches);
        const rate = winrate(allStats.w, allStats.l);

        document.getElementById('overallStats').innerHTML = `
            <div class="stat-card">
                <div class="stat-label">総合戦績</div>
                <div class="stat-value">${allStats.w}勝${allStats.l}敗</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">総合勝率</div>
                <div class="stat-value winrate">${rate}%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">総試合数</div>
                <div class="stat-value">${allMatches.length}</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">最近30日</div>
                <div class="stat-value winrate">${winrate(
                    calcWL(allMatches.filter(m => {
                        const d = new Date(m.created_at);
                        const now = new Date();
                        return (now - d) / (1000 * 60 * 60 * 24) <= 30;
                    })).w,
                    calcWL(allMatches.filter(m => {
                        const d = new Date(m.created_at);
                        const now = new Date();
                        return (now - d) / (1000 * 60 * 60 * 24) <= 30;
                    })).l
                )}%</div>
            </div>
        `;
    }

    function renderTodayStats() {
        const today = getToday();
        const todayMatches = allMatches.filter(m => 
            new Date(m.created_at).toISOString().substring(0, 10) === today
        );
        const todayStats = calcWL(todayMatches);
        const weekMatches = allMatches.filter(m => {
            const d = new Date(m.created_at);
            const now = new Date();
            return (now - d) / (1000 * 60 * 60 * 24) <= 7;
        });
        const weekStats = calcWL(weekMatches);

        document.getElementById('todayStats').innerHTML = `
            <div class="stat-card">
                <div class="stat-label">本日戦績</div>
                <div class="stat-value">${todayStats.w}勝${todayStats.l}敗</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">本日勝率</div>
                <div class="stat-value winrate">${winrate(todayStats.w, todayStats.l)}%</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">今週戦績</div>
                <div class="stat-value">${weekStats.w}勝${weekStats.l}敗</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">今週勝率</div>
                <div class="stat-value winrate">${winrate(weekStats.w, weekStats.l)}%</div>
            </div>
        `;
    }

    function renderStreak() {
        const streak = calcCurrentStreak();
        document.getElementById('winStreak').textContent = streak.winStreak;
        document.getElementById('loseStreak').textContent = streak.loseStreak;
    }

    function renderWinrateCharts() {
        // 勝率推移チャート（過去14日）
        const last14Days = {};
        const today = new Date();

        for (let i = 13; i >= 0; i--) {
            const d = new Date(today);
            d.setDate(d.getDate() - i);
            const key = `${d.getMonth() + 1}/${d.getDate()}`;
            last14Days[key] = { w: 0, l: 0 };
        }

        allMatches.filter(m => {
            const d = new Date(m.created_at);
            return (today - d) / (1000 * 60 * 60 * 24) <= 14;
        }).forEach(m => {
            const d = new Date(m.created_at);
            const key = `${d.getMonth() + 1}/${d.getDate()}`;
            if (m.result === 'win') last14Days[key].w++;
            else last14Days[key].l++;
        });

        const labels = Object.keys(last14Days);
        const winrates = labels.map(k => {
            const s = last14Days[k];
            return ((s.w / (s.w + s.l)) * 100) || 0;
        });

        if (charts.winrate) charts.winrate.destroy();
        const ctx1 = document.getElementById('winrateChart').getContext('2d');
        charts.winrate = new Chart(ctx1, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: '勝率 (%)',
                    data: winrates,
                    borderColor: '#ff6b35',
                    backgroundColor: 'rgba(255, 107, 53, 0.1)',
                    borderWidth: 2,
                    tension: 0.4,
                    fill: true,
                    pointBackgroundColor: '#ff6b35',
                    pointBorderColor: '#fff',
                    pointBorderWidth: 2,
                    pointRadius: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        labels: { color: '#b0b8c1' }
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100,
                        ticks: { color: '#b0b8c1' },
                        grid: { color: 'rgba(255, 107, 53, 0.1)' }
                    },
                    x: {
                        ticks: { color: '#b0b8c1' },
                        grid: { color: 'rgba(255, 107, 53, 0.1)' }
                    }
                }
            }
        });

        // 相手キャラ別勝率
        const enemyStats = {};
        allMatches.forEach(m => {
            if (!enemyStats[m.enemy_char]) {
                enemyStats[m.enemy_char] = { w: 0, l: 0 };
            }
            if (m.result === 'win') enemyStats[m.enemy_char].w++;
            else enemyStats[m.enemy_char].l++;
        });

        const enemyLabels = Object.keys(enemyStats).sort();
        const enemyWinrates = enemyLabels.map(k => {
            const s = enemyStats[k];
            return parseFloat(winrate(s.w, s.l));
        });

        if (charts.matchup) charts.matchup.destroy();
        const ctx2 = document.getElementById('matchupChart').getContext('2d');
        charts.matchup = new Chart(ctx2, {
            type: 'bar',
            data: {
                labels: enemyLabels,
                datasets: [{
                    label: '勝率 (%)',
                    data: enemyWinrates,
                    backgroundColor: enemyWinrates.map(v => 
                        v >= 60 ? '#2ecc71' : v < 40 ? '#e74c3c' : '#f39c12'
                    ),
                    borderRadius: 8,
                    borderSkipped: false
                }]
            },
            options: {
                indexAxis: 'y',
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        labels: { color: '#b0b8c1' }
                    }
                },
                scales: {
                    x: {
                        beginAtZero: true,
                        max: 100,
                        ticks: { color: '#b0b8c1' },
                        grid: { color: 'rgba(255, 107, 53, 0.1)' }
                    },
                    y: {
                        ticks: { color: '#b0b8c1' },
                        grid: { color: 'transparent' }
                    }
                }
            }
        });
    }

    function renderAnalysis() {
        const myChar = document.getElementById('analysisMySelect').value;
        const myMatches = myChar ? allMatches.filter(m => m.my_char === myChar) : allMatches;

        if (myMatches.length === 0) {
            document.getElementById('analysisContent').innerHTML = 
                '<div class="empty-state"><div class="empty-state-icon">📊</div>記録がありません</div>';
            return;
        }

        const allStats = calcWL(myMatches);
        const monthlyData = {};
        myMatches.forEach(m => {
            const d = new Date(m.created_at);
            const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
            if (!monthlyData[key]) monthlyData[key] = { w: 0, l: 0 };
            if (m.result === 'win') monthlyData[key].w++;
            else monthlyData[key].l++;
        });

        let html = `
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">総合勝率</div>
                    <div class="stat-value winrate">${winrate(allStats.w, allStats.l)}%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">試合数</div>
                    <div class="stat-value">${myMatches.length}</div>
                </div>
            </div>
            <h3 style="margin-top: 24px;">月別戦績</h3>
            <div class="monthly-list">
        `;

        Object.keys(monthlyData).sort().reverse().forEach(k => {
            const s = monthlyData[k];
            html += `
                <div class="monthly-item">
                    <span class="monthly-period">${k}</span>
                    <span class="monthly-stats">${s.w}勝${s.l}敗 (${winrate(s.w, s.l)}%)</span>
                </div>
            `;
        });

        html += '</div>';
        document.getElementById('analysisContent').innerHTML = html;
    }

    function renderMatchups() {
        const enemy = document.getElementById('analysisEnemySelect').value;
        const vsMatches = enemy ? allMatches.filter(m => m.enemy_char === enemy) : allMatches;

        if (vsMatches.length === 0) {
            document.getElementById('matchupsContent').innerHTML = 
                '<div class="empty-state"><div class="empty-state-icon">⚔️</div>記録がありません</div>';
            return;
        }

        const totalStats = calcWL(vsMatches);
        const byChar = {};
        vsMatches.forEach(m => {
            if (!byChar[m.my_char]) byChar[m.my_char] = { w: 0, l: 0 };
            if (m.result === 'win') byChar[m.my_char].w++;
            else byChar[m.my_char].l++;
        });

        let html = `
            <div class="stat-card">
                <div class="stat-label">対${enemy || '全相手'}戦績</div>
                <div style="font-size: 20px; margin-top: 8px; color: var(--accent); font-weight: 700;">${totalStats.w}勝${totalStats.l}敗 (${winrate(totalStats.w, totalStats.l)}%)</div>
            </div>
            <h3 style="margin-top: 24px;">自キャラ別</h3>
            <div class="monthly-list">
        `;

        Object.keys(byChar).sort().forEach(k => {
            const s = byChar[k];
            html += `
                <div class="monthly-item">
                    <span class="monthly-period">${k}</span>
                    <span class="monthly-stats">${s.w}勝${s.l}敗 (${winrate(s.w, s.l)}%)</span>
                </div>
            `;
        });

        html += '</div>';

        // 対策メモ
        const memos = vsMatches.filter(v => v.memo);
        if (memos.length > 0) {
            html += '<h3 style="margin-top: 24px;">対策メモ</h3><div class="monthly-list">';
            memos.slice().reverse().forEach(v => {
                html += `
                    <div style="padding: 12px; border-bottom: 1px solid var(--border); text-align: left;">
                        <div style="font-size: 11px; color: var(--text-secondary); margin-bottom: 4px;">${new Date(v.created_at).toLocaleString('ja-JP')} - ${v.my_char}</div>
                        <div style="font-style: italic; color: var(--text-secondary);">"${v.memo}"</div>
                    </div>
                `;
            });
            html += '</div>';
        }

        document.getElementById('matchupsContent').innerHTML = html;
    }

    function renderHistory() {
        const search = document.getElementById('searchFilter').value.toLowerCase();

        let filtered = allMatches.filter(m => {
            return !search || 
                   m.my_char.toLowerCase().includes(search) || 
                   m.enemy_char.toLowerCase().includes(search) || 
                   (m.memo && m.memo.toLowerCase().includes(search));
        });

        if (filtered.length === 0) {
            document.getElementById('historyList').innerHTML = 
                '<div class="empty-state"><div class="empty-state-icon">📜</div>試合記録がありません</div>';
            return;
        }

        document.getElementById('historyList').innerHTML = filtered
            .map(m => `
                <div class="monthly-item" style="flex-direction: column; align-items: flex-start;">
                    <div style="display: flex; gap: 12px; width: 100%; align-items: center; justify-content: space-between;">
                        <div>
                            <div style="font-weight: 600;">${m.my_char} <span style="color: var(--text-secondary);">vs</span> ${m.enemy_char}</div>
                            <div style="font-size: 12px; color: var(--text-secondary); margin-top: 4px;">${new Date(m.created_at).toLocaleString('ja-JP')}</div>
                        </div>
                        <div style="display: flex; gap: 8px; align-items: center;">
                            <span style="padding: 4px 12px; border-radius: 20px; font-weight: 700; font-size: 12px; background: ${m.result === 'win' ? '#2ecc71' : '#e74c3c'};">
                                ${m.result === 'win' ? '勝ち' : '負け'}
                            </span>
                            <button class="btn-danger" onclick="deleteMatch(${m.id})">削除</button>
                        </div>
                    </div>
                    ${m.memo ? `<div style="font-size: 12px; color: var(--text-secondary); margin-top: 8px; font-style: italic;">${m.memo}</div>` : ''}
                </div>
            `)
            .join('');
    }

    // イベントリスナー
    document.getElementById('analysisMySelect').addEventListener('change', renderAnalysis);
    document.getElementById('analysisEnemySelect').addEventListener('change', renderMatchups);
    document.getElementById('searchFilter').addEventListener('input', renderHistory);

    // 初期化
    checkUser();
</script>

</body>
</html>
